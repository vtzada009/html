<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario em html 5</title>
</head>
<body>
    <h1>formulario em html 5</h1>
    <h3>cadastro de novo usuario</h3>

    <form action="">
        <label for="nome">Nome completo</label>
        <br>
        <input 
            type="text" 
            name="nome" 
            id="nome"
            placeholder="digite seu nome"
            required
        >
        <br><br>
        <label for="email">Email</label>
        <br>
        <input 
            type="email" 
            name="email" 
            id="email"
            placeholder="digite seu email"
            required
        >
        <br><br>
        <label for="senha">Senha</label>
        <br>
        <input 
            type="password" 
            name="senha" 
            id="senha"
            placeholder="digite sua senha"
            required
        >
        <br><br>
        <label for="data-nascimento">Data De Nascimento</label>
        <br>
        <input 
            type="date" 
            name="data-nascimento" 
            id="data-nascimento"
            required
        >
        <br><br>
        <label for="genero">genero</label>
        <br>
        <input 
            type="radio" 
            name="genero" 
            id="genero"
        >
        <label for="masculino">Masculino</label>
        
        <input 
            type="radio" 
            name="genero" 
            id="genero"
        >
        <label for="feminio">Feminino</label>
    </form>
</body>
</html>
