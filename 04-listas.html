<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listas em html5</title>
</head>
<body>
    <h1>listas em html5</h1>
    <h3>listas não ordenadas</h3>
    <ul>
        <li>pão</li>
        <li>leite</li>
        <li>café</li>
        <li>bolacha</li>
    </ul>

    <h3>lista ordenada</h3>
    <ol>
        <li>molhar o cabelo</li>
        <li>passar shampoo</li>
        <li>enxaguar o cabelo para retirar o shampoo</li>
        <li>passar o condicionador</li>
        <li>enxaguar o cabelo para tirar o condicionador</li>
    </ol>
</body>
</html>
